function applyEdits(){const r=data.find(x=>x.id===currentEditId);if(!r)return;r.title=document.getElementById('ef-title').value.trim();r.chef=document.getElementById('ef-chef').value.trim();const nc=document.getElementById('ef-cat').value;const cl={mare:'Mare & Pesce',pasta:'Pasta & Cereali',legumi:'Zuppe & Legumi',veg:'Verdure & Cereali'};r.cat=nc;r.catLabel=cl[nc]||nc;r.porzioni=document.getElementById('ef-porzioni').value.trim();r.note=document.getElementById('ef-note').value.trim();r.ingredients=document.getElementById('ef-ing').value.split('\n').map(s=>s.trim()).filter(Boolean);r.allergeni=document.getElementById('ef-allergeni').value.trim();r.macros.kcal=parseInt(document.getElementById('ef-kcal').value)||0;r.macros.prot=parseInt(document.getElementById('ef-prot').value)||0;r.macros.carb=parseInt(document.getElementById('ef-carb').value)||0;r.macros.grassi=parseInt(document.getElementById('ef-grassi').value)||0;r.procedimento=document.getElementById('ef-proc').value.trim();r.motivazione=document.getElementById('ef-motiv').value.trim();r.cottura=document.getElementById('ef-cottura').value.trim();r.antitumorale=document.getElementById('ef-antitum').value.trim();r.stagione=document.getElementById('ef-stagione').value.trim();const idx=data.findIndex(x=>x.id===r.id);if(!extraData[idx])extraData[idx]={};extraData[idx].diabete=document.getElementById('ef-diabete').value.trim();extraData[idx].adattamenti={vegan:document.getElementById('ef-ad-vegan').value.trim(),lattosio:document.getElementById('ef-ad-latt').value.trim(),celiaci:document.getElementById('ef-ad-celi').value.trim(),halal:document.getElementById('ef-ad-halal').value.trim(),kosher:document.getElementById('ef-ad-kosh').value.trim()};const hr=document.getElementById('ef-haccp').value.trim();extraData[idx].haccp={fasi:hr?hr.split('\n').filter(l=>l.trim()).map(l=>{const p=l.split('|').map(x=>x.trim());return{nome:p[0]||'',pericolo:p[1]||'',misura:p[2]||'',ccp:(p[3]||'').toLowerCase()==='true'}}):[]};renderCards(currentCardFilter);renderSchede(currentSchedeFilter);renderHaccp(currentHaccpFilter);buildEditorSelect();showToast('✓ Modifiche applicate!')}
function deleteRecipe(id){if(!confirm('Eliminare questa ricetta?'))return;data=data.filter(r=>r.id!==id);currentEditId=data.length?data[0].id:-1;renderCards(currentCardFilter);renderSchede(currentSchedeFilter);renderHaccp(currentHaccpFilter);buildEditorSelect();showToast('Ricetta eliminata')}
function addNewRecipe(){const nid=Date.now(),nn=data.length+1;data.push({id:nid,numero:nn,title:"Nuova ricetta",chef:"",cat:"veg",catLabel:"Verdure & Cereali",accent:"acc-veg",tags:[["veg","tag-veg"]],porzioni:"Dosi per 4 persone",ingredients:["Ingrediente 1","Ingrediente 2"],macros:{kcal:0,prot:0,carb:0,grassi:0},note:"",allergeni:"Nessuno",procedimento:"Descrivi il procedimento...",motivazione:"Motivazione nutrizionale...",cottura:"Tecniche di cottura...",antitumorale:"Benefici oncologici...",stagione:"Tutto l'anno",ingChips:[{t:"Ingrediente",c:""}]});extraData.push({diabete:"",adattamenti:{vegan:"",lattosio:"",celiaci:"",halal:"",kosher:""},haccp:{fasi:[]}});currentEditId=nid;renderCards(currentCardFilter);renderSchede(currentSchedeFilter);renderHaccp(currentHaccpFilter);buildEditorSelect();showToast('✓ Nuova ricetta aggiunta!')}

function renderCards(filter){currentCardFilter=filter;const grid=document.getElementById('cards-grid');grid.innerHTML='';data.filter(r=>filter==='all'||r.cat===filter).forEach((r,i)=>{const th=r.tags.map(([l,c])=>`<span class="tag ${c}">${l}</span>`).join('');const ih=r.ingredients.map(ing=>`<li><span class="ing-dot"></span>${ing}</li>`).join('');const card=document.createElement('div');card.className='card';card.style.animationDelay=`${i*.06}s`;card.innerHTML=`<div class="card-accent ${r.accent}"></div><div class="card-body"><div class="card-category cat-${r.cat}">${r.catLabel}</div><div class="card-title">${r.title}</div><div class="card-chef">${r.chef?'Chef / Autore: '+r.chef:''}</div><span class="porzioni-badge">${r.porzioni}</span><div class="divider"></div><div class="tags">${th}</div>${r.note?`<p style="font-size:.86rem;font-style:italic;opacity:.6;font-weight:300;line-height:1.45">${r.note}</p>`:''}</div><div class="ingredients-section"><button class="ingredients-toggle" onclick="toggleIng(this)"><span class="toggle-icon">+</span>&nbsp; Ingredienti</button><div class="ingredients-list"><ul>${ih}</ul></div></div><div class="macros"><div class="macro"><div class="macro-val">${r.macros.kcal}</div><span class="macro-label">kcal</span></div><div class="macro"><div class="macro-val">${r.macros.prot}g</div><span class="macro-label">proteine</span></div><div class="macro"><div class="macro-val">${r.macros.carb}g</div><span class="macro-label">carboidrati</span></div><div class="macro"><div class="macro-val">${r.macros.grassi}g</div><span class="macro-label">grassi</span></div></div><button class="detail-btn" onclick="openModal(${r.id})">📋 Scheda nutrizionale completa</button><button class="card-edit-btn" onclick="openEditorFor(${r.id})">✏️ Modifica ricetta</button>`;grid.appendChild(card)})}

function renderSchede(filter){currentSchedeFilter=filter;const grid=document.getElementById('schede-grid');grid.innerHTML='';data.filter(r=>filter==='all'||r.cat===filter).forEach((r,i)=>{const ex=extraData[r.id]||{};const diabete=ex.diabete||'';const adapt=ex.adattamenti||{};const ch=r.ingChips.map(c=>`<span class="ing-chip ${c.c}">${c.t}</span>`).join('');const ah=Object.entries(adapt).map(([k,v])=>`<div class="adapt-card adapt-${k}"><span class="adapt-label">${{vegan:'🌱 Vegan',lattosio:'🥛 Lattosio',celiaci:'🌾 Celiaci',halal:'☪ Halal',kosher:'✡ Kosher'}[k]||k}</span><p class="adapt-text">${v}</p></div>`).join('');const s=document.createElement('div');s.className='scheda';s.style.animationDelay=`${i*.07}s`;s.innerHTML=`<div class="scheda-header"><div class="scheda-num">${r.numero}</div><div class="scheda-title-block"><div class="scheda-title">${r.title}</div>${r.chef?`<div class="scheda-chef">Chef / Autore: ${r.chef}</div>`:''}</div><div class="tags" style="margin:0;flex-shrink:0">${r.tags.map(([l,c])=>`<span class="tag ${c}">${l}</span>`).join('')}</div></div><div class="scheda-body"><div class="scheda-cell full"><div class="scheda-cell-label"><span>🛒</span> Ingredienti (${r.porzioni})</div><div class="scheda-cell-content"><div class="ing-chips">${ch}</div><p style="margin-top:.6rem;font-size:.88rem;opacity:.7">${r.ingredients.join(' · ')}</p></div></div><div class="scheda-cell allergeni"><div class="scheda-cell-label"><span>⚠️</span> Allergeni</div><div class="scheda-cell-content">${r.allergeni}</div></div><div class="scheda-cell stagione"><div class="scheda-cell-label"><span>🌿</span> Stagionalità</div><div class="scheda-cell-content">${r.stagione}</div></div><div class="scheda-cell full"><div class="scheda-cell-label"><span>👨‍🍳</span> Procedimento</div><div class="scheda-cell-content">${r.procedimento}</div></div><div class="scheda-cell motiv full"><div class="scheda-cell-label"><span>🩺</span> Motivazione nutrizionale</div><div class="scheda-cell-content">${r.motivazione}</div></div><div class="scheda-cell cottura full"><div class="scheda-cell-label" style="color:#5D4037"><span>🍳</span> Tecniche di cottura e benefici nutrizionali</div><div class="scheda-cell-content">${r.cottura}</div></div><div class="scheda-cell antitumorale full"><div class="scheda-cell-label" style="color:var(--purple)"><span>🔬</span> Prevenzione oncologica</div><div class="scheda-cell-content">${r.antitumorale}</div></div><div class="scheda-cell diabete full"><div class="scheda-cell-label" style="color:var(--coral)"><span>💊</span> Prevenzione Diabete T2, Ipertensione &amp; Aterosclerosi</div><div class="scheda-cell-content">${diabete}</div></div><div class="scheda-cell full" style="background:#F8F9FA"><div class="scheda-cell-label"><span>🍽</span> Adattamenti dietetici e religiosi</div><div class="adapt-grid">${ah}</div></div></div><div class="macros-row"><div class="macro"><div class="macro-val">${r.macros.kcal}</div><span class="macro-label">kcal/porz.</span></div><div class="macro"><div class="macro-val">${r.macros.prot}g</div><span class="macro-label">proteine</span></div><div class="macro"><div class="macro-val">${r.macros.carb}g</div><span class="macro-label">carboidrati</span></div><div class="macro"><div class="macro-val">${r.macros.grassi}g</div><span class="macro-label">grassi</span></div></div>`;grid.appendChild(s)})}

function renderHaccp(filter){currentHaccpFilter=filter;const grid=document.getElementById('haccp-grid');grid.innerHTML='';data.filter(r=>filter==='all'||r.cat===filter).forEach((r,i)=>{const ex=extraData[r.id]||{};const haccp=ex.haccp||{fasi:[]};const adapt=ex.adattamenti||{};const diabete=ex.diabete||'';const fh=haccp.fasi.map((f,fi)=>`<div class="haccp-step"><div class="haccp-step-arrow">${fi>0?'<div class="haccp-arrow-line"></div><div class="haccp-arrow-head">▼</div>':'<div style="height:8px"></div>'}</div><div class="haccp-box${f.ccp?' is-ccp':''}"><div class="haccp-box-head"><span class="haccp-step-name">${fi+1}. ${f.nome}</span><span class="${f.ccp?'haccp-ccp-badge':'haccp-ok-badge'}">${f.ccp?'CCP':'CP'}</span></div><div class="haccp-box-body"><div class="haccp-field"><label>⚠ Pericolo</label><p>${f.pericolo}</p></div><div class="haccp-field"><label>✓ Misura di controllo</label><p>${f.misura}</p></div></div></div></div>`).join('');const ah=Object.entries(adapt).map(([k,v])=>`<div class="adapt-card adapt-${k}"><span class="adapt-label">${{vegan:'🌱 Vegan',lattosio:'🥛 Intolleranti lattosio',celiaci:'🌾 Celiaci',halal:'☪ Halal',kosher:'✡ Kosher'}[k]||k}</span><p class="adapt-text">${v}</p></div>`).join('');const s=document.createElement('div');s.className='scheda';s.style.animationDelay=`${i*.07}s`;s.innerHTML=`<div class="scheda-header"><div class="scheda-num">${r.numero}</div><div class="scheda-title-block"><div class="scheda-title">${r.title}</div>${r.chef?`<div class="scheda-chef">Chef / Autore: ${r.chef}</div>`:''}</div><div class="tags" style="margin:0;flex-shrink:0">${r.tags.map(([l,c])=>`<span class="tag ${c}">${l}</span>`).join('')}</div></div><div class="scheda-body"><div class="scheda-cell diabete full"><div class="scheda-cell-label" style="color:var(--coral)"><span>💊</span> Prevenzione Diabete T2, Ipertensione &amp; Aterosclerosi</div><div class="scheda-cell-content">${diabete}</div></div><div class="scheda-cell full" style="background:#F8F9FA"><div class="scheda-cell-label"><span>🍽</span> Adattamenti dietetici e religiosi</div><div class="adapt-grid">${ah}</div></div><div class="scheda-cell full"><div class="scheda-cell-label" style="color:var(--haccp-head)"><span>🔐</span> Piano HACCP — Diagramma di flusso con CCP</div><div class="haccp-legend"><span><span class="haccp-ccp-badge">CCP</span> Punto Critico di Controllo</span><span><span class="haccp-ok-badge">CP</span> Punto di Controllo</span></div><div class="haccp-flow" style="margin-top:.8rem">${fh}</div></div></div>`;grid.appendChild(s)})}

function openModal(id){const r=data.find(x=>x.id===id);if(!r)return;const ch=r.ingChips.map(c=>`<span class="ing-chip ${c.c}">${c.t}</span>`).join('');document.getElementById('modal-body').innerHTML=`<div style="border-top:4px solid var(--navy)"><div class="scheda-header" style="background:var(--sky2)"><div class="scheda-num">${r.numero}</div><div class="scheda-title-block"><div class="scheda-title">${r.title}</div>${r.chef?`<div class="scheda-chef">Chef / Autore: ${r.chef}</div>`:''}</div></div><div style="padding:1.2rem 1.5rem;display:flex;flex-direction:column;gap:1rem"><div><div class="scheda-cell-label"><span>🛒</span> Ingredienti</div><span class="porzioni-badge" style="margin:.4rem 0;display:inline-block">${r.porzioni}</span><div class="ing-chips" style="margin-top:.4rem">${ch}</div><p style="margin-top:.5rem;font-size:.86rem;opacity:.65;line-height:1.55">${r.ingredients.join(' · ')}</p></div><div style="background:var(--peach);border-radius:3px;padding:.7rem .9rem"><div class="scheda-cell-label"><span>⚠️</span> Allergeni</div><p style="color:var(--aller);font-weight:400;font-size:.9rem;margin-top:.3rem">${r.allergeni}</p></div><div><div class="scheda-cell-label"><span>👨‍🍳</span> Procedimento</div><p style="font-size:.9rem;line-height:1.65;font-weight:300;margin-top:.3rem">${r.procedimento}</p></div><div style="background:var(--mint);border-radius:3px;padding:.8rem 1rem"><div class="scheda-cell-label"><span>🩺</span> Motivazione nutrizionale</div><p style="color:var(--motiv);font-size:.88rem;line-height:1.7;font-weight:300;margin-top:.3rem">${r.motivazione}</p></div><div style="background:#FBF7F0;border-radius:3px;padding:.8rem 1rem;border-left:3px solid var(--gold)"><div class="scheda-cell-label" style="color:#5D4037"><span>🍳</span> Tecniche di cottura</div><p style="color:#5D4037;font-size:.88rem;line-height:1.7;font-weight:300;margin-top:.3rem">${r.cottura}</p></div><div style="background:var(--purple-bg);border-radius:3px;padding:.8rem 1rem"><div class="scheda-cell-label" style="color:var(--purple)"><span>🔬</span> Prevenzione oncologica</div><p style="color:var(--purple);font-size:.88rem;line-height:1.7;font-weight:300;margin-top:.3rem">${r.antitumorale}</p></div><div><div class="scheda-cell-label"><span>🌿</span> Stagionalità</div><p style="font-size:.88rem;font-style:italic;opacity:.7;margin-top:.2rem">${r.stagione}</p></div></div><div class="macros-row" style="border-top:1px solid var(--sky2)"><div class="macro"><div class="macro-val">${r.macros.kcal}</div><span class="macro-label">kcal</span></div><div class="macro"><div class="macro-val">${r.macros.prot}g</div><span class="macro-label">proteine</span></div><div class="macro"><div class="macro-val">${r.macros.carb}g</div><span class="macro-label">carboidrati</span></div><div class="macro"><div class="macro-val">${r.macros.grassi}g</div><span class="macro-label">grassi</span></div></div></div>`;document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden'}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay')&&!e.target.classList.contains('modal-close'))return;document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow=''}
function openEditorFor(id){currentEditId=id;if(!editorOpen)toggleEditor();else buildEditorSelect();document.getElementById('editor-recipe-select').value=id;loadRecipeInEditor(id)}
function toggleIng(btn){const l=btn.nextElementSibling,ic=btn.querySelector('.toggle-icon');l.classList.toggle('open');ic.classList.toggle('open')}
function switchView(view,btn){document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));document.getElementById('view-'+view).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});if(view==='haccp')renderHaccp(currentHaccpFilter)}
function filterCards(cat,btn){document.querySelectorAll('#view-cards .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards(cat)}
function filterSchede(cat,btn){document.querySelectorAll('#view-schede .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSchede(cat)}
function filterHaccp(cat,btn){document.querySelectorAll('#view-haccp .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHaccp(cat)}

renderCards('all');
renderSchede('all');
</script>
</body>
</html>
