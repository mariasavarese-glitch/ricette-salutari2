<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricette Salutari — Classe II</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#f5f0e8;--sand:#e8dcc8;--terracotta:#c4673a;--olive:#6b7c4a;
  --deep:#2a1f14;--gold:#c9a84c;--sea:#3a6b7c;--navy:#1B4F72;
  --mint:#EAFAF1;--peach:#FDEBD0;--sky:#EBF5FB;--sky2:#D6EAF8;
  --motiv:#1D6A39;--aller:#784212;--purple:#6C3483;--purple-bg:#F5EEF8;
  --coral:#C0392B;--coral-bg:#FDEDEC;
  --adapt-border:#AEB6BF;--haccp-head:#2C3E50;--haccp-ccp:#E74C3C;--haccp-ok:#27AE60;
}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Crimson Pro',serif;color:var(--deep);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(196,103,58,.07) 0%,transparent 50%),
                   radial-gradient(ellipse at 90% 80%,rgba(58,107,124,.07) 0%,transparent 50%)}
#editor-sidebar{position:fixed;top:0;right:0;width:480px;height:100vh;background:#1a1a2e;color:#e8e8f0;z-index:2000;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.4)}
#editor-sidebar.open{transform:translateX(0)}
.editor-top{background:#16213e;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid #2d2d50;flex-shrink:0}
.editor-top h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;flex:1;color:#c9b9e8}
.editor-close{background:none;border:none;color:#999;font-size:1.4rem;cursor:pointer;line-height:1;padding:.2rem}
.editor-close:hover{color:#fff}
.editor-recipe-select{padding:.5rem .8rem .5rem 1.2rem;background:#16213e;border-bottom:1px solid #2d2d50;flex-shrink:0}
.editor-recipe-select select{width:100%;background:#0f3460;color:#e8e8f0;border:1px solid #2d5f8f;border-radius:3px;padding:.5rem .8rem;font-family:'Crimson Pro',serif;font-size:.95rem;cursor:pointer}
.editor-body{flex:1;overflow-y:auto;padding:1.2rem}
.editor-body::-webkit-scrollbar{width:5px}
.editor-body::-webkit-scrollbar-track{background:#16213e}
.editor-body::-webkit-scrollbar-thumb{background:#2d5f8f;border-radius:3px}
.field-group{margin-bottom:1.1rem}
.field-group label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#8899cc;margin-bottom:.35rem}
.field-group input,.field-group textarea,.field-group select{width:100%;background:#0d1b2a;color:#e8e8f0;border:1px solid #2d3a5a;border-radius:3px;padding:.55rem .75rem;font-family:'Crimson Pro',serif;font-size:.92rem;line-height:1.5;resize:vertical;transition:border-color .2s}
.field-group input:focus,.field-group textarea:focus,.field-group select:focus{outline:none;border-color:#5b8ee6;background:#0f2340}
.field-group textarea{min-height:80px}
.field-group textarea.tall{min-height:120px}
.field-sep{height:1px;background:#2d2d50;margin:1.2rem 0}
.field-section-title{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#6c9fff;margin-bottom:.8rem;padding:.3rem 0;border-bottom:1px solid #1f2f50}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.editor-footer{padding:1rem 1.2rem;background:#16213e;border-top:1px solid #2d2d50;display:flex;gap:.6rem;flex-shrink:0}
.btn-apply{flex:1;padding:.65rem;background:#1D6A39;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-apply:hover{background:#27a34f}
.btn-download{flex:1;padding:.65rem;background:#c4673a;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-download:hover{background:#d4834a}
.btn-new{padding:.65rem 1rem;background:#1B4F72;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-new:hover{background:#2471a3}
#edit-fab{position:fixed;bottom:1.8rem;right:1.8rem;z-index:1500;width:54px;height:54px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(27,79,114,.45);transition:all .22s;display:flex;align-items:center;justify-content:center}
#edit-fab:hover{background:var(--terracotta);transform:scale(1.07)}
#edit-fab.active{background:var(--terracotta)}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1D6A39;color:#fff;padding:.6rem 1.4rem;border-radius:3px;font-size:.85rem;letter-spacing:.06em;z-index:3000;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.site-header{text-align:center;padding:3.5rem 2rem 1.5rem}
.header-line{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 1.4rem}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.4rem);font-weight:400;letter-spacing:.05em;line-height:1.1}
.site-header h1 em{font-style:italic;color:var(--terracotta)}
.site-header p{margin-top:.7rem;font-size:.82rem;color:var(--sea);font-weight:300;letter-spacing:.14em;text-transform:uppercase}
.view-tabs{display:flex;justify-content:center;gap:0;margin:1.2rem auto 0;max-width:700px;border:1.5px solid var(--sand);border-radius:3px;overflow:hidden}
.view-tab{flex:1;padding:.55rem 1rem;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;color:var(--deep);transition:all .22s;text-transform:uppercase}
.view-tab+.view-tab{border-left:1.5px solid var(--sand)}
.view-tab.active{background:var(--navy);color:#fff}
.view-tab:not(.active):hover{background:var(--sand)}
.filter-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:.55rem;padding:1.4rem 2rem 2rem}
.filter-btn{border:1.5px solid var(--sand);background:transparent;color:var(--deep);font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.06em;padding:.38rem 1rem;cursor:pointer;border-radius:2px;transition:all .22s}
.filter-btn:hover{background:var(--deep);color:var(--cream);border-color:var(--deep)}
.filter-btn.active{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.view-panel{display:none}
.view-panel.active{display:block}
.cards-grid{max-width:1400px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.8rem}
.card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 2px 18px rgba(42,31,20,.06);transition:transform .28s,box-shadow .28s;display:flex;flex-direction:column;opacity:0;animation:fadeUp .5s ease forwards}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 36px rgba(42,31,20,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}.card:nth-child(9){animation-delay:.36s}.card:nth-child(10){animation-delay:.40s}.card:nth-child(11){animation-delay:.44s}.card:nth-child(12){animation-delay:.48s}.card:nth-child(13){animation-delay:.52s}
.card-accent{height:4px;width:100%}
.card-body{padding:1.5rem 1.5rem .9rem;flex:1}
.card-category{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;opacity:.75;margin-bottom:.45rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.17rem;font-weight:400;line-height:1.35;margin-bottom:.4rem}
.card-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-bottom:.5rem}
.porzioni-badge{display:inline-block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--deep);color:var(--cream);padding:.18rem .6rem;border-radius:2px;margin-bottom:.5rem}
.divider{height:1px;background:linear-gradient(90deg,var(--sand),transparent);margin:.7rem 0}
.tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem}
.tag{font-size:.7rem;padding:.18rem .55rem;border-radius:2px;letter-spacing:.04em}
.tag-km0{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-dop{background:rgba(201,168,76,.15);color:#8a6d1a}
.tag-mare{background:rgba(58,107,124,.12);color:var(--sea)}
.tag-carne{background:rgba(180,60,60,.1);color:#8a2020}
.tag-veg{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-legumi{background:rgba(196,103,58,.12);color:var(--terracotta)}
.tag-integrale{background:rgba(42,31,20,.08);color:var(--deep)}
.tag-pat{background:rgba(107,124,74,.18);color:#2d5a1b}
.ingredients-section{padding:0 1.5rem .9rem}
.ingredients-toggle{display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--terracotta);border:none;background:none;font-family:'Crimson Pro',serif;padding:.5rem 0;width:100%;text-align:left;transition:opacity .2s}
.ingredients-toggle:hover{opacity:.65}
.toggle-icon{font-size:1rem;transition:transform .28s;display:inline-block;line-height:1}
.toggle-icon.open{transform:rotate(45deg)}
.ingredients-list{display:none;padding-bottom:.8rem;animation:slideDown .22s ease}
.ingredients-list.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.ingredients-list ul{list-style:none;display:flex;flex-direction:column;gap:.28rem}
.ingredients-list li{font-size:.9rem;display:flex;align-items:flex-start;gap:.45rem;line-height:1.4;font-weight:300}
.ing-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:.45em;flex-shrink:0}
.macros{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sand);padding:.75rem 1.5rem}
.macro{text-align:center}
.macro-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--deep);line-height:1}
.macro-label{font-size:.63rem;letter-spacing:.07em;text-transform:uppercase;opacity:.5;margin-top:.18rem;display:block}
.detail-btn{display:block;width:100%;padding:.55rem;background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;transition:background .2s}
.detail-btn:hover{background:var(--terracotta)}
.card-edit-btn{display:block;width:100%;padding:.45rem;background:#f0f0f0;color:var(--deep);border:none;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;transition:background .2s;border-top:1px solid var(--sand)}
.card-edit-btn:hover{background:var(--sand)}
.acc-mare{background:linear-gradient(90deg,var(--sea),#5a9bb0)}
.acc-legumi{background:linear-gradient(90deg,var(--terracotta),#d4845a)}
.acc-veg{background:linear-gradient(90deg,var(--olive),#8a9e60)}
.acc-pasta{background:linear-gradient(90deg,var(--gold),#d4b46c)}
.acc-insalata{background:linear-gradient(90deg,#6b9c7c,#8abf9c)}
.acc-zuppa{background:linear-gradient(90deg,#7c6b3a,#a08c50)}
.cat-mare{color:var(--sea)}.cat-legumi{color:var(--terracotta)}.cat-veg{color:var(--olive)}
.cat-pasta{color:#8a6d1a}.cat-insalata{color:#3a7c5a}.cat-zuppa{color:#7c6b3a}
.schede-grid{max-width:1100px;margin:0 auto;padding:0 2rem 5rem;display:flex;flex-direction:column;gap:2.4rem}
.scheda{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 2px 20px rgba(42,31,20,.07);opacity:0;animation:fadeUp .5s ease forwards}
.scheda-header{padding:1.1rem 1.6rem;display:flex;align-items:center;gap:1rem;border-bottom:3px solid var(--navy)}
.scheda-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);opacity:.25;line-height:1;flex-shrink:0;min-width:2.2rem}
.scheda-title-block{flex:1}
.scheda-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:400;color:var(--navy);line-height:1.25}
.scheda-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-top:.15rem}
.scheda-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:700px){.scheda-body{grid-template-columns:1fr}}
.scheda-cell{padding:1rem 1.4rem;border-right:1px solid var(--sky2);border-bottom:1px solid var(--sky2)}
.scheda-cell:nth-child(2n){border-right:none}
.scheda-cell.full{grid-column:1/-1;border-right:none}
.scheda-cell-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);font-weight:400;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.scheda-cell-content{font-size:.92rem;line-height:1.6;font-weight:300}
.scheda-cell.allergeni .scheda-cell-content{color:var(--aller);font-weight:400;background:var(--peach);border-radius:3px;padding:.5rem .7rem;font-size:.88rem}
.scheda-cell.motiv .scheda-cell-content{color:var(--motiv);font-weight:300;background:var(--mint);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.cottura .scheda-cell-content{color:#5D4037;font-weight:300;background:#FBF7F0;border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--gold)}
.scheda-cell.antitumorale .scheda-cell-content{color:var(--purple);font-weight:300;background:var(--purple-bg);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.stagione .scheda-cell-content{font-style:italic;opacity:.7;font-size:.88rem}
.scheda-cell.diabete .scheda-cell-content{color:var(--coral);font-weight:300;background:var(--coral-bg);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--coral)}
.ing-chips{display:flex;flex-wrap:wrap;gap:.35rem}
.ing-chip{background:var(--sky);color:var(--navy);font-size:.75rem;padding:.2rem .55rem;border-radius:2px;line-height:1.4;font-weight:300}
.ing-chip.dop{background:rgba(201,168,76,.2);color:#7a5c10}
.ing-chip.igp{background:rgba(58,107,124,.15);color:var(--sea)}
.ing-chip.km0{background:rgba(107,124,74,.18);color:var(--olive)}
.ing-chip.pat{background:rgba(107,124,74,.25);color:#2d5a1b}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sky2)}
.macros-row .macro{text-align:center;padding:.7rem .5rem}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,31,20,.55);z-index:999;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:4px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{float:right;margin:1rem 1.2rem 0 0;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--deep);opacity:.5;transition:opacity .2s;line-height:1}
.modal-close:hover{opacity:1}
.adapt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;margin-top:.4rem}
.adapt-card{background:#fff;border:1px solid var(--adapt-border);border-radius:3px;padding:.7rem .9rem}
.adapt-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:.3rem;display:block}
.adapt-text{font-size:.83rem;line-height:1.55;font-weight:300}
.adapt-vegan .adapt-label{color:#27AE60}
.adapt-lattosio .adapt-label{color:#8E44AD}
.adapt-celiaci .adapt-label{color:#D35400}
.adapt-halal .adapt-label{color:#1A5276}
.adapt-kosher .adapt-label{color:#7D6608}
.haccp-flow{display:flex;flex-direction:column;gap:0}
.haccp-step{display:flex;gap:.6rem;align-items:stretch}
.haccp-step-arrow{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px}
.haccp-arrow-line{flex:1;width:2px;background:#AEB6BF;margin:0 auto}
.haccp-arrow-head{font-size:.8rem;color:#AEB6BF;line-height:1}
.haccp-box{flex:1;background:#fff;border:1px solid #AEB6BF;border-radius:3px;margin-bottom:4px;overflow:hidden}
.haccp-box.is-ccp{border-color:var(--haccp-ccp);border-width:2px}
.haccp-box-head{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;background:#F2F3F4}
.haccp-box.is-ccp .haccp-box-head{background:#FDEDEC}
.haccp-step-name{font-size:.85rem;font-weight:600;flex:1;line-height:1.3}
.haccp-ccp-badge{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;background:var(--haccp-ccp);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}
.haccp-ok-badge{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;background:var(--haccp-ok);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}
.haccp-box-body{padding:.45rem .8rem .55rem;display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem}
@media(max-width:600px){.haccp-box-body{grid-template-columns:1fr}}
.haccp-field label{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:#5D6D7E;display:block;margin-bottom:.1rem}
.haccp-field p{font-size:.82rem;line-height:1.5;font-weight:300}
.haccp-legend{display:flex;gap:1rem;margin-top:.5rem;font-size:.75rem;align-items:center}
.haccp-legend span{display:flex;align-items:center;gap:.3rem}
footer{text-align:center;padding:1.8rem;font-size:.73rem;letter-spacing:.1em;text-transform:uppercase;opacity:.4}
@media(max-width:600px){.cards-grid,.schede-grid{padding:0 1rem 3rem}.site-header{padding:2.5rem 1rem 1.2rem}#editor-sidebar{width:100vw}}
</style>
</head>
<body>

<div id="editor-sidebar">
  <div class="editor-top">
    <h2>✏️ Editor Ricette</h2>
    <button class="editor-close" onclick="toggleEditor()" title="Chiudi">×</button>
  </div>
  <div class="editor-recipe-select">
    <select id="editor-recipe-select" onchange="loadRecipeInEditor(parseInt(this.value))"></select>
  </div>
  <div class="editor-body" id="editor-form-body"></div>
  <div class="editor-footer">
    <button class="btn-apply" onclick="applyEdits()">✓ Applica</button>
    <button class="btn-new" onclick="addNewRecipe()">＋ Nuova</button>
    <button class="btn-download" onclick="downloadHTML()">⬇ Scarica HTML</button>
  </div>
</div>

<button id="edit-fab" onclick="toggleEditor()" title="Apri editor">✏️</button>

<header class="site-header">
  <div class="header-line"></div>
  <h1>Piatti <em>Salutari</em> Campani</h1>
  <p>Cucina mediterranea · Classe II · Prevenzione metabolica, oncologica, DT2, ipertensione · DOP · IGP · PAT · km0</p>
  <div class="view-tabs" style="margin-top:1.6rem">
    <button class="view-tab active" onclick="switchView('cards',this)">🃏 Schede Ricetta</button>
    <button class="view-tab" onclick="switchView('schede',this)">🩺 Analisi Nutrizionale</button>
    <button class="view-tab" onclick="switchView('haccp',this)">🔐 HACCP</button>
  </div>
</header>

<div id="view-cards" class="view-panel active">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCards('all',this)">Tutte (13)</button>
    <button class="filter-btn" onclick="filterCards('mare',this)">🐟 Mare</button>
    <button class="filter-btn" onclick="filterCards('pasta',this)">🍝 Pasta &amp; Cereali</button>
    <button class="filter-btn" onclick="filterCards('legumi',this)">🫘 Legumi</button>
    <button class="filter-btn" onclick="filterCards('veg',this)">🌿 Verdure</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div id="view-schede" class="view-panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterSchede('all',this)">Tutte (13)</button>
    <button class="filter-btn" onclick="filterSchede('mare',this)">🐟 Mare</button>
    <button class="filter-btn" onclick="filterSchede('pasta',this)">🍝 Pasta &amp; Cereali</button>
    <button class="filter-btn" onclick="filterSchede('legumi',this)">🫘 Legumi</button>
    <button class="filter-btn" onclick="filterSchede('veg',this)">🌿 Verdure</button>
  </div>
  <div class="schede-grid" id="schede-grid"></div>
</div>

<div id="view-haccp" class="view-panel">

  {id:0,numero:1,title:"Spigola al Cartoccio con Carote Lesse",chef:"Amitrano",cat:"mare",catLabel:"Mare & Pesce",accent:"acc-mare",

   ingredients:["4 filetti di spigola 160 g cad. (pesca costiera campana)","4 carote medie (agro-sarnese, km0)","1 limone di Sorrento IGP","prezzemolo fresco","2 spicchi aglio","olio EVO campano DOP","sale marino integrale","pepe nero","timo fresco"],
   macros:{kcal:220,prot:28,carb:10,grassi:8},note:"Cottura al vapore nel cartoccio: nessun grasso aggiunto",

   procedimento:"Disporre ogni filetto di spigola su un foglio di carta forno. Aggiungere fettine di carota, aglio, prezzemolo, scorza di limone IGP, olio EVO e sale. Chiudere il cartoccio ermeticamente. Cuocere in forno a 180°C per 18–20 min. Servire nel cartoccio aperto al tavolo con le carote lesse come contorno.",
   motivazione:"La spigola è pesce magro con 18 g di proteine/100 g e grassi insaturi benefici. La cottura al cartoccio non aggiunge grassi e preserva tutti i nutrienti. Le carote apportano betacarotene (pro-vitamina A) e fibre. Il limone di Sorrento IGP aggiunge vitamina C e limonene antiossidante.",
   cottura:"Il cartoccio crea un microclima di vapore umido a 180°C: la temperatura interna del pesce raggiunge i 63°C garantendo la sicurezza microbiologica senza sovracottura. Questo metodo preserva Omega-3 e aminoacidi essenziali che si degraderebbero con la frittura o la grigliatura ad alta temperatura. Le carote lesse in acqua leggermente salata mantengono betacarotene e carotenoidi che aumentano la biodisponibilità con la cottura.",

  {id:1,numero:2,title:"Il Mediterraneo a Tavola",chef:"Gargiulo",cat:"mare",catLabel:"Mare & Pesce",accent:"acc-mare",
   tags:[["mare","tag-mare"],["DOP","tag-dop"],["IGP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["300 g riso integrale bio","2 orate di mare FAO 37 (pesca locale)","prezzemolo fresco campano","olio EVO Penisola Sorrentina DOP","4 spicchi aglio di Nubia IGP","30 g capperi di Pantelleria GP","60 g olive di Gaeta DOP","2 zucchine San Pasquale PAT","menta fresca","2 limoni IGP Penisola Sorrentina","sale marino integrale"],
   macros:{kcal:390,prot:26,carb:48,grassi:12},note:"Eccezionale concentrazione di DOP, IGP e PAT campani e siciliani",
   allergeni:"Pesce (orata)",
   procedimento:"Cuocere il riso integrale in acqua salata 35 min, raffreddare. Cuocere le orate in padella con olio EVO DOP, aglio di Nubia IGP, capperi di Pantelleria dissalati e olive di Gaeta DOP per 12 min. Saltare le zucchine San Pasquale con menta. Impiattare il riso integrale come base, adagiare l'orata, guarnire con zucchine, scorza di limone IGP e prezzemolo.",
   motivazione:"Piatto straordinariamente ricco di prodotti di eccellenza territoriale. Il riso integrale ha IG basso (50) grazie alle fibre. L'orata è pesce magro con Omega-3 e proteine di alta qualità. I capperi di Pantelleria contengono quercetina e rutina, tra i flavonoidi più potenti. Le olive di Gaeta DOP apportano acido oleico cardioprotettivo.",
   cottura:"La cottura dell'orata in padella con olio EVO DOP a fuoco moderato (160°C) preserva gli Omega-3 evitando la loro ossidazione termica. I capperi vengono dissalati a freddo per mantenere intatti i glucosinolati. Il riso integrale viene raffreddato dopo la cottura per massimizzare la formazione di amido resistente RS3. Il limone IGP viene usato esclusivamente a crudo per preservare limonene e vitamina C.",
   antitumorale:"I capperi di Pantelleria sono tra le fonti più concentrate di quercetina in natura: questo flavonoide inibisce la proliferazione di cellule tumorali di colon, seno e polmone. Le olive di Gaeta DOP apportano oleuropeina e idrossitirosolo con accertata attività antitumorale. L'aglio di Nubia IGP contiene allicina e organosolfurati, tra i composti naturali più studiati in oncologia preventiva. Il riso integrale apporta lignani che riducono il rischio di tumori ormono-dipendenti.",
   stagione:"Tutto l'anno (riso integrale e prodotti conservati); orata fresca ottobre-aprile; zucchine San Pasquale maggio-settembre",

  {id:2,numero:3,title:"Ciotola Mediterranea",chef:"Aprea",cat:"legumi",catLabel:"Legumi & Cereali",accent:"acc-legumi",
   tags:[["legumi","tag-legumi"],["DOP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["180 g cicerchie PAT (legume antico campano)","200 g orzo semiperlato","200 g pomodorini del Piennolo DOP","2 zucchine San Pasquale PAT","40 g noci di Sorrento PAT","80 g friarielli PAT campani","1 finocchio fresco","sale iodato","origano campano","olio EVO DOP Penisola Sorrentina"],
   macros:{kcal:380,prot:16,carb:54,grassi:13},note:"Ben 5 prodotti PAT e 1 DOP campani in un unico piatto",
   allergeni:"Frutta a guscio (noci) · Glutine (orzo)",
   procedimento:"Ammollare le cicerchie 24 ore, cuocere 60 min in acqua non salata. Cuocere l'orzo 25 min. Saltare i friarielli con olio EVO DOP e aglio. Tagliare zucchine San Pasquale e finocchio a julienne crude. In ciotola assemblare orzo, cicerchie, pomodorini Piennolo DOP, friarielli, zucchine e finocchio. Condire con olio EVO DOP, sale iodato e origano. Guarnire con noci di Sorrento PAT.",
   motivazione:"Le cicerchie PAT sono un legume antico con eccezionale contenuto di proteine (25 g/100 g) e fibre (16 g/100 g) e IG bassissimo. Le noci di Sorrento PAT apportano Omega-3 ALA vegetali, vitamina E e magnesio. I friarielli PAT campani sono ricchi di ferro, calcio e vitamina K. Il sale iodato previene le patologie tiroidee. Piatto a elevatissima densità nutrizionale.",
   cottura:"Le cicerchie richiedono ammollo obbligatorio di 24 ore e cottura prolungata (60 min) per eliminare la ODAP (beta-N-ossalil-aminoalanina), neurotossina termolabile presente nel legume crudo — questa è la fase HACCP più critica di tutto il piatto. L'orzo viene cotto e raffreddato per massimizzare l'amido resistente. Le zucchine e il finocchio sono serviti crudi per preservare enzimi e vitamina C. Le noci vengono aggiunte a freddo per non ossidarne i grassi polinsaturi.",
   antitumorale:"Le cicerchie contengono lectine e inibitori delle proteasi che in quantità controllate mostrano attività antitumorale documentata in studi in vitro. I friarielli (cime di rapa) appartengono alla famiglia Brassicacea: contengono glucosinolati e indolo-3-carbinolo con azione di modulazione del metabolismo estrogenico riducendo il rischio di tumori ormonali. Le noci di Sorrento PAT apportano acido ellagico con spiccata attività antiproliferativa, e acidi grassi Omega-3 ALA antinfiammatori.",
   stagione:"Inverno-primavera (friarielli e cicerchie ottobre-marzo); pomodorini Piennolo DOP tutto l'anno anche conservati",

  {id:3,numero:4,title:"Risotto Zucchine e Speck",chef:"Carità",cat:"pasta",catLabel:"Cereali & Riso",accent:"acc-pasta",
   tags:[["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g riso carnaroli","3 zucchine medie (km0, stagione)","100 g speck Alto Adige IGP (in quantità limitata)","1 cipolla bianca","olio EVO campano","30 g parmigiano reggiano","brodo vegetale","vino bianco secco","sale","pepe","menta fresca"],
   macros:{kcal:420,prot:18,carb:58,grassi:14},note:"Bilanciare la sapidità dello speck con poca aggiunta di sale",
   allergeni:"Glutine (speck) · Latte (parmigiano) · Solfiti (vino bianco)",
   procedimento:"Soffriggere la cipolla in olio EVO. Tostare il riso 2 min. Sfumare con vino bianco. Aggiungere brodo caldo a mestoli e cuocere 16 min mescolando. A metà cottura unire le zucchine tagliate a rondelle e lo speck a julienne. Mantecare fuori fuoco con parmigiano. Guarnire con menta fresca.",
   motivazione:"Le zucchine km0 sono ipocaloriche (17 kcal/100 g), ricche di potassio e vitamina C. Lo speck viene usato in piccola quantità come condimento (25 g/porzione): apporta sapidità concentrata riducendo la necessità di sale aggiunto. La mantecatura fuori fuoco con parmigiano limita i grassi saturi. Il riso carnaroli ha IG moderato abbassato dalla presenza di zucchine.",
   cottura:"La tostatura del riso a secco gelatinizza parzialmente la superficie dei granuli abbassando l'indice glicemico. La tecnica del risotto (aggiunta graduale di brodo caldo) massimizza la cessione di amido nel liquido di cottura creando cremosità senza aggiunta di grassi. Lo speck viene aggiunto a metà cottura: il calore moderato (non la frittura) preserva i suoi aromi senza formare composti tossici. La mantecatura fuori fuoco evita la separazione dei grassi del formaggio.",
   antitumorale:"Le zucchine contengono cucurbitacine e luteina con documentata attività antitumorale. La menta fresca apporta perillyl alcohol, un monoterpene con effetti pro-apoptotici su cellule tumorali in studi pre-clinici. Limitare la quantità di speck (carne processata) è fondamentale: l'IARC classifica le carni processate come gruppo 1 (cancerogene certe) per il tumore del colon-retto — usarne 25 g/porzione invece di 80–100 g riduce drasticamente l'esposizione ai nitrosati.",
   stagione:"Estate-autunno (zucchine maggio-settembre); speck disponibile tutto l'anno",
   ingChips:[{t:"Riso carnaroli",c:""},{t:"Zucchine km0",c:"km0"},{t:"Speck Alto Adige IGP",c:"igp"},{t:"Olio EVO",c:"km0"},{t:"Parmigiano",c:""}]},

   tags:[["mare","tag-mare"],["IGP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["400 g pesce spada freschissimo (abbattuto, pesca Sicilia/Campania)","2 limoni di Sorrento IGP (succo e scorza)","olio EVO campano","prezzemolo fresco","erba cipollina","1 cucchiaio capperi dissalati","4 fette pane integrale (crostini)","sale marino integrale","pepe bianco","1 cucchiaino senape Dijon"],
   macros:{kcal:280,prot:30,carb:18,grassi:10},note:"Usare SOLO pesce spada abbattuto a -18°C per ≥ 24h (obbligo di legge per il crudo)",
   allergeni:"Pesce (pesce spada) · Glutine (pane) · Senape",
   procedimento:"Tritare finemente al coltello il pesce spada abbattuto. Preparare la salsa con succo e scorza di limone IGP, olio EVO, senape, sale e pepe. Condire il pesce con metà della salsa, capperi e erba cipollina. Formare quenelles con due cucchiai. Tostare il pane integrale. Impiattare la tartare sui crostini con la salsa rimanente a parte e prezzemolo fresco.",
   motivazione:"Il pesce spada è fonte di proteine complete (20 g/100 g) e Omega-3 DHA/EPA. La preparazione a crudo preserva integralmente tutti i nutrienti termolabili. Il limone di Sorrento IGP non solo insaporisce ma il suo acido citrico denatura parzialmente le proteine superficiali (marinatura acida). I crostini integrali apportano fibre che abbassano il carico glicemico del pasto.",
   cottura:"PREPARAZIONE A FREDDO — nessuna cottura termica. Il pesce spada DEVE obbligatoriamente essere stato abbattuto a -18°C per ≥ 24 ore (Reg. CE 853/2004) per eliminare il parassita Anisakis simplex. L'acidità del limone IGP (pH ≈ 2–3) contribuisce alla sicurezza microbiologica superficiale ma NON sostituisce l'abbattimento termico. I crostini integrali vengono tostati a T ≤ 180°C per evitare la formazione di acrilammide.",
   antitumorale:"Il pesce spada apporta Omega-3 EPA e DHA con azione antinfiammatoria sistemica che contrasta la cancerogenesi. Il limone di Sorrento IGP è eccezionalmente ricco di limonene: uno studio clinico ha dimostrato la sua capacità di indurre regressione di lesioni pre-cancerose al seno. Il prezzemolo apporta apigenina con documentata inibizione della proliferazione cellulare. I capperi contengono quercetina e campferolo, antiossidanti con potente azione antiproliferativa.",
   stagione:"Estate (pesce spada luglio-settembre); limone IGP tutto l'anno",

  {id:5,numero:6,title:"Tubettone Sorrentino Integrale",chef:"Esposito",cat:"pasta",catLabel:"Pasta",accent:"acc-pasta",
   tags:[["integrale","tag-integrale"],["IGP","tag-dop"],["km0","tag-km0"],["PAT","tag-pat"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g pasta integrale (tubettoni)","200 g piselli novelli coltivati negli orti della Penisola Sorrentina","olio EVO Penisola Sorrentina DOP","1 cipollotto fresco tritato","finocchietto selvatico campano","scorza grattugiata di 2 limoni di Sorrento IGP","30 g granella noci di Sorrento PAT","6 alici di Cetara sotto sale","sale marino integrale","pepe nero"],
   macros:{kcal:430,prot:18,carb:62,grassi:14},note:"Ogni ingrediente è un presidio del territorio sorrentino-campano",
   allergeni:"Glutine (pasta) · Pesce (alici) · Frutta a guscio (noci)",
   procedimento:"Dissalare le alici in acqua fredda 30 min. Soffriggere il cipollotto in olio EVO DOP. Aggiungere i piselli novelli e cuocere 8 min con poco brodo. Cuocere la pasta integrale al dente. Mantecare pasta e piselli, aggiungere le alici spezzettate fuori fuoco, scorza di limone IGP e finocchietto. Impiattare con granella di noci di Sorrento PAT.",
   motivazione:"I piselli novelli sorrentini hanno IG basso (35) e apportano proteine e fibre. La pasta integrale abbassa del 30% l'indice glicemico rispetto alla pasta raffinata. Le alici di Cetara apportano Omega-3, calcio e vitamina D. La granella di noci di Sorrento PAT aggiunge grassi polinsaturi Omega-3 ALA e vitamina E. Il finocchietto è ricco di flavonoidi e anetolo con proprietà antinfiammatorie.",
   cottura:"Le alici di Cetara vengono dissalate a freddo (30 min in acqua ≤ 10°C) e aggiunte esclusivamente fuori fuoco: il calore prolungato ossidarebba irrimediabilmente gli Omega-3 e svilupperebbe istamina. Il cipollotto viene soffritto a fuoco dolce per liberare i composti solforati senza bruciare. I piselli novelli vengono cotti brevemente (8 min) per preservare vitamina C e il colore verde brillante (clorofilla). La scorza di limone IGP e le noci vengono aggiunte sempre a crudo.",
   antitumorale:"Le alici di Cetara apportano Omega-3 EPA e DHA che inibiscono la sintesi di prostaglandine pro-infiammatorie implicate nella cancerogenesi del colon. Il finocchietto contiene anetolo, un fenilpropanoide con documentata attività pro-apoptotica. Le noci di Sorrento PAT sono ricche di acido ellagico con potente azione antiproliferativa specialmente su tumori del seno e della prostata. Il limone di Sorrento IGP apporta limonene che inibisce la farnesil-transferasi, un enzima chiave nella crescita tumorale.",
   stagione:"Primavera-estate (piselli novelli sorrentini aprile-giugno); alici di Cetara e limone IGP tutto l'anno",
   ingChips:[{t:"Pasta integrale",c:""},{t:"Piselli Sorrento km0",c:"km0"},{t:"Olio EVO DOP",c:"dop"},{t:"Limone Sorrento IGP",c:"igp"},{t:"Noci Sorrento PAT",c:"pat"},{t:"Alici Cetara",c:"km0"}]},

  {id:6,numero:7,title:"Seppia Ripiena con Zucchine San Pasquale in Guazzetto",chef:"Iaccarino",cat:"mare",catLabel:"Mare & Pesce",accent:"acc-mare",
   tags:[["mare","tag-mare"],["km0","tag-km0"],["PAT","tag-pat"]],porzioni:"Dosi per 4 persone",
   ingredients:["4 seppie medie (pesca costiera campana)","3 zucchine San Pasquale PAT","prezzemolo fresco abbondante","2 spicchi aglio","olio EVO campano","vino bianco secco","pomodorini del Piennolo DOP","sale marino","pepe","pane integrale grattugiato (50 g)","1 uovo (per il ripieno)"],
   macros:{kcal:290,prot:28,carb:14,grassi:11},note:"Il guazzetto di prezzemolo è il sugo tradizionale di accompagnamento delle seppie campane",
   allergeni:"Molluschi (seppia) · Uova · Glutine (pane grattugiato) · Solfiti (vino bianco)",
   procedimento:"Pulire le seppie conservando i sacchi. Preparare il ripieno con tentacoli tritati, zucchine San Pasquale PAT a cubetti, prezzemolo, aglio, pane grattugiato integrale e uovo. Farcire le seppie e chiudere con stuzzicadenti. In casseruola rosolare in olio EVO, sfumare con vino bianco, aggiungere pomodorini Piennolo DOP e cuocere 35 min a fuoco basso. Servire con abbondante guazzetto di prezzemolo.",
   motivazione:"La seppia è mollusco magrissimo con soli 72 kcal/100 g e un eccellente profilo proteico (16 g/100 g) con bassissimi grassi saturi. L'inchiostro di seppia contiene melanina e taurina con proprietà antiossidanti documentate. Le zucchine San Pasquale PAT sono ipocaloriche e ricche di potassio. Il prezzemolo apporta vitamina C, apigenina e folati in quantità eccezionali.",
   cottura:"La farcitura con pane integrale funge da agente legante a basso indice glicemico rispetto al pane bianco. La cottura lenta in casseruola (35 min a fuoco basso) è tecnica di brasatura umida che intenerisce il collagene dei molluschi rendendoli digeribili senza indurirne le proteine. Il vino bianco viene aggiunto all'inizio per evaporare i solfiti nella fase calda; i pomodorini Piennolo DOP vengono aggiunti successivamente per preservare il licopene, che aumenta la biodisponibilità con il calore moderato.",
   antitumorale:"Il prezzemolo è la fonte alimentare più ricca di apigenina: questo flavonoide ha dimostrato in studi clinici di inibire la crescita di cellule tumorali della prostata e del seno. I pomodorini del Piennolo DOP apportano licopene e betacarotene, carotenoidi antiossidanti associati alla riduzione del rischio di tumori della prostata e polmone. Le zucchine San Pasquale PAT contengono cucurbitacine con attività antitumorale su cellule di leucemia. L'aglio aggiunge allicina e diallil disolfuro, i più studiati organosolfurati anticancro.",
   stagione:"Primavera-estate (seppie febbraio-giugno; zucchine San Pasquale maggio-settembre)",
   ingChips:[{t:"Seppia km0",c:"km0"},{t:"Zucchine S.Pasquale PAT",c:"pat"},{t:"Piennolo DOP",c:"dop"},{t:"Prezzemolo fresco",c:""},{t:"Olio EVO",c:"km0"}]},

  {id:7,numero:8,title:"Farro Integrale con Sgombro e Verdure di Stagione",chef:"Mastellone",cat:"pasta",catLabel:"Cereali Integrali",accent:"acc-pasta",
   tags:[["integrale","tag-integrale"],["mare","tag-mare"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["250 g farro integrale","200 g sgombro al naturale (pesca locale)","150 g pomodorini campani freschi (km0)","2 zucchine medie (stagione, km0)","olio EVO campano","basilico fresco","menta fresca","succo di limone","1 spicchio aglio","sale marino integrale","pepe nero"],
   macros:{kcal:360,prot:22,carb:46,grassi:11},note:"Il farro integrale richiede ammollo di 8 ore per ridurre i tempi di cottura",
   allergeni:"Glutine (farro) · Pesce (sgombro)",
   procedimento:"Ammollare il farro integrale 8 ore. Cuocere in acqua salata 45 min, scolare e raffreddare. Tagliare le zucchine a dadini e saltarle in padella con olio EVO e aglio 5 min. Tagliare i pomodorini a metà. Sgocciolare lo sgombro. In ciotola assemblare farro raffreddato, sgombro sbriciolato, zucchine, pomodorini, basilico e menta. Condire con olio EVO e succo di limone.",
   motivazione:"Il farro integrale ha IG ≈ 35 (tra i più bassi dei cereali) grazie all'alta concentrazione di fibre (8 g/100 g) e alla struttura integra del chicco. Lo sgombro è il pesce azzurro con la più alta concentrazione di Omega-3 (2,2 g/100 g). Il raffreddamento del farro massimizza l'amido resistente. Piatto a bassissimo indice glicemico, ideale per prevenzione del DT2 e sindrome metabolica.",
   cottura:"L'ammollo obbligatorio del farro integrale (8 ore) riduce gli antinutrienti (acido fitico, tannini) migliorando la biodisponibilità di ferro, zinco e calcio. Lo sgombro al naturale non subisce ulteriore cottura, preservando integralmente gli Omega-3 EPA e DHA. Il raffreddamento rapido del farro genera amido resistente RS3 che fermentato nel colon produce butirrato, un acido grasso a catena corta protettivo per la mucosa intestinale. Le erbe aromatiche (basilico, menta) vengono aggiunte sempre a crudo.",
   antitumorale:"Lo sgombro è il pesce azzurro per eccellenza: gli Omega-3 EPA e DHA riducono i livelli di prostaglandine pro-infiammatorie implicate nella cancerogenesi. Il farro integrale apporta lignani (fitoestrogeni) che riducono i livelli di estrogeni liberi circolanti abbassando il rischio di tumori ormono-dipendenti. I pomodorini campani forniscono licopene. Il basilico apporta eugenolo che inibisce l'angiogenesi tumorale. La menta contribuisce con perillyl alcohol, un monoterpene con attività antitumorale documentata.",

   ingredients:["300 g riso integrale carnaroli","200 g gamberetti sgusciati (km0, pesca locale)","150 g cozze (km0, allevamento costiero campano)","100 g vongole veraci (km0)","150 g pomodorini campani","1 cipolla piccola","2 spicchi aglio","olio EVO campano","vino bianco secco","prezzemolo fresco","brodo di pesce homemade","sale marino","peperoncino"],
   macros:{kcal:410,prot:28,carb:50,grassi:10},note:"Il riso integrale richiede pre-ammollo e tempi di cottura più lunghi del carnaroli classico",
   allergeni:"Crostacei (gamberetti) · Molluschi (cozze, vongole) · Solfiti (vino bianco) · Glutine (eventuale nel brodo)",
   procedimento:"Aprire cozze e vongole in padella con aglio e vino bianco, filtrare il liquido di cottura. Soffriggere cipolla in olio EVO, tostare il riso integrale 3 min. Aggiungere brodo di pesce caldo a mestoli mescolando. A 3/4 cottura (25 min) aggiungere i gamberetti, i molluschi sgusciati, il liquido filtrato e i pomodorini. Terminare la cottura. Mantecare fuori fuoco. Prezzemolo fresco abbondante.",
   motivazione:"Il riso integrale ha IG ≈ 50 vs il riso bianco IG ≈ 72, grazie alle fibre del pericarpo. Gamberi, cozze e vongole sono proteine magre con eccellente profilo amminoacidico. Le cozze sono la fonte alimentare più ricca di vitamina B12 (320 μg/100 g) e selenio. I gamberetti apportano iodio, fondamentale per la funzione tiroidea. Il brodo di pesce homemade è privo di esaltatori di sapidità e glutammato aggiunto.",
   cottura:"Il riso integrale viene tostato a secco 3 min prima del liquido: questa tecnica sigilla i granuli abbassando l'IG e sviluppando composti aromatici. Le cozze e le vongole vengono aperte a fuoco vivo e brevemente (3 min): la sovracottura le indurisce. Il liquido di apertura dei molluschi (pieno di minerali e iodio) viene filtrato e aggiunto al risotto. I gamberetti vengono aggiunti negli ultimi 3 min di cottura per non rendere gommose le proteine.",
   antitumorale:"Le cozze e le vongole contengono selenio, un oligoelemento fondamentale per l'attività della glutatione perossidasi, il principale enzima antiossidante cellulare: bassi livelli di selenio correlano con aumento del rischio di tumori di fegato, polmone e colon-retto. I gamberetti apportano astaxantina (carotenoide) con documentata azione antitumorale. Il prezzemolo abbondante fornisce apigenina. Il pomodorino campano aggiunge licopene.",
   stagione:"Tutto l'anno (frutti di mare disponibili in continua); pomodorini campani estate-autunno",
   ingChips:[{t:"Riso integrale",c:""},{t:"Gamberetti km0",c:"km0"},{t:"Cozze km0",c:"km0"},{t:"Vongole km0",c:"km0"},{t:"Pomodorini campani",c:"km0"},{t:"Olio EVO",c:"km0"}]},

  {id:9,numero:10,title:"Pennette Integrali Broccoli e Provolone del Monaco",chef:"Panico",cat:"pasta",catLabel:"Pasta Integrale",accent:"acc-pasta",

   macros:{kcal:390,prot:17,carb:58,grassi:11},note:"Il provolone del Monaco DOP, tipicità dei Monti Lattari, si usa in piccola quantità come condimento non come formaggio abbondante",
   allergeni:"Glutine (pasta) · Latte (provolone del Monaco)",
   procedimento:"Lessare i broccoli baresi al dente in acqua salata, scolare tenendo l'acqua di cottura. In padella soffriggere aglio e peperoncino in olio EVO, aggiungere i broccoli e schiacciare parte di essi per creare una crema grossolana. Cuocere la pasta integrale al dente nella stessa acqua dei broccoli. Mantecare pasta e broccoli aggiungendo acqua di cottura. Fuori fuoco grattugiare il provolone del Monaco DOP e mescolare. Servire con prezzemolo.",
   motivazione:"I broccoli baresi contengono sulforafano, il composto bioattivo più studiato in oncologia nutrizionale. La pasta integrale ha IG ≈ 40. L'abbinamento pasta integrale + broccoli + provolone del Monaco DOP crea un piatto con proteine complete, fibre e calcio in proporzioni ottimali. Cuocere i broccoli nella stessa acqua della pasta trasferisce parte dei glucosinolati idrosolubili nel liquido di cottura che viene poi riassorbito nella mantecatura.",
   cottura:"La cottura dei broccoli nella stessa acqua della pasta è una tecnica intelligente: recupera i glucosinolati idrosolubili disciolti nell'acqua di cottura. I broccoli vengono cotti al dente (6–8 min): cotture più lunghe distruggerebbero la mirosinasi e i glucosinolati. Schiacciare metà dei broccoli crea una crema che fa da condimento senza aggiungere grassi. Il provolone del Monaco DOP viene aggiunto fuori fuoco per preservarne gli aromi e non perdere calcio nella scolatura.",
   antitumorale:"I broccoli baresi sono la fonte più ricca di sulforafano, la molecola naturale più studiata in oncologia: attiva i geni NRF2 (soppressori tumorali), induce l'apoptosi nelle cellule cancerose e inibisce le metastasi. L'aglio aggiunge allicina e diallil disolfuro con effetto antitumorale documentato. Il provolone del Monaco DOP stagionato apporta acido linoleico coniugato (CLA), un acido grasso con dimostrata attività anticancro su tumori del seno e del colon. Il peperoncino aggiunge capsaicina pro-apoptotica.",
   stagione:"Autunno-inverno (broccoli baresi ottobre-marzo); provolone del Monaco DOP e pasta disponibili tutto l'anno",

  {id:10,numero:11,title:"Pasta e Cicerchie di Capri",chef:"Pollio",cat:"legumi",catLabel:"Legumi & Pasta",accent:"acc-legumi",
   tags:[["legumi","tag-legumi"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["180 g cicerchie di Capri PAT (ammollate 24h)","200 g pasta mista integrale (spaghetti spezzati o pasta mista)","2 pomodori ramati (stagione)","1 cipolla dorata","2 spicchi aglio","rosmarino fresco","olio EVO campano","brodo vegetale","sale marino integrale","peperoncino","prezzemolo fresco"],
   macros:{kcal:370,prot:17,carb:58,grassi:8},note:"Ammollo obbligatorio 24h e cottura lenta per eliminare la ODAP tossica",
   allergeni:"Glutine (pasta)",
   procedimento:"Ammollare le cicerchie 24 ore cambiando l'acqua 2-3 volte. Cuocere in acqua non salata per 60-70 min fino a completa tenerezza. Soffriggere cipolla, aglio e rosmarino in olio EVO. Aggiungere i pomodori a pezzetti e le cicerchie cotte. Cuocere la pasta mista nella zuppa aggiungendo brodo. La pasta assorbirà il sugo creando consistenza densa. Finire con olio EVO a crudo, prezzemolo e peperoncino.",
   motivazione:"Le cicerchie di Capri PAT sono un legume antico con proteine di alta qualità (25 g/100 g), IG bassissimo (< 30) e alto contenuto di fibre prebiotiche. La cottura come zuppa densa crea una pasta e fagioli ad alto potere saziante. L'amido della pasta si combina con le fibre delle cicerchie abbassando significativamente il carico glicemico dell'intero piatto.",
   cottura:"L'ammollo di 24 ore con cambi d'acqua frequenti è OBBLIGATORIO e CCP principale: riduce la ODAP (beta-N-ossalil-L-aminoalanina), neurotossina termolabile responsabile del latirismo. La cottura senza sale nelle prime fasi favorisce l'idratazione del legume. La pasta viene cotta direttamente nella zuppa: l'amido che rilascia crea cremosità naturale senza aggiungere grassi. Rosmarino e olio EVO a crudo finale preservano i polifenoli.",
   antitumorale:"Le cicerchie contengono lectine e inibitori di proteasi con documentata attività pro-apoptotica in vitro su cellule tumorali. Il rosmarino apporta acido carnosico e acido rosmarinico, antiossidanti liposolubili con effetto inibitorio su enzimi pro-infiammatori implicati nella cancerogenesi. I pomodori freschi forniscono licopene. L'aglio contribuisce con allicina e organosolfurati. Le fibre delle cicerchie aumentano la produzione di butirrato nel colon, protettivo contro il tumore del colon-retto.",
   stagione:"Tutto l'anno (cicerchie secche disponibili in continuità); pomodori freschi estate",

  {id:11,numero:12,title:"Tagliolini al Limone",chef:"Salvato",cat:"pasta",catLabel:"Pasta",accent:"acc-pasta",
   tags:[["IGP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g tagliolini freschi all'uovo (o secchi)","3 limoni di Sorrento IGP (scorza e succo)","40 g burro di qualità","200 ml panna fresca (ridotta, 50 ml/porzione)","40 g parmigiano reggiano stagionato","sale marino integrale","pepe bianco","basilico fresco","erba cipollina fresca"],
   macros:{kcal:480,prot:14,carb:60,grassi:20},note:"Usare la scorza biologica del limone IGP — è il vero protagonista del piatto",
   allergeni:"Glutine (tagliolini) · Uova (tagliolini freschi) · Latte (burro, panna, parmigiano)",
   procedimento:"Cuocere i tagliolini in abbondante acqua salata (2 min se freschi, 6 min se secchi). Nel frattempo sciogliere il burro a fuoco bassissimo, aggiungere la panna e portare a leggera ebollizione. Fuori fuoco aggiungere scorza e succo dei limoni di Sorrento IGP e parmigiano. Scolare i tagliolini al dente e mantecare nella salsa con un po' di acqua di cottura. Servire con basilico fresco ed erba cipollina.",
   motivazione:"Il limone di Sorrento IGP è l'ingrediente protagonista: la sua scorza contiene limonene, hesperidina e vitamina C in concentrazioni eccezionali. La panna viene usata in quantità limitata (50 ml/porzione) come veicolo lipidico che aumenta la biodisponibilità dei flavonoidi liposolubili del limone. I tagliolini freschi all'uovo apportano proteine complete. Per una versione più salutare è possibile sostituire metà panna con brodo vegetale.",
   cottura:"Il burro e la panna vengono scaldati a fuoco bassissimo (< 90°C): evitare l'ebollizione prolungata che degraderebbe la struttura delle proteine del latte creando sapori amarognoli. Il limone — scorza e succo — viene aggiunto SEMPRE fuori fuoco: il calore degraderebbe il limonene volatile e la vitamina C termolabile. La mantecatura con acqua di cottura (ricca di amido) permette di ridurre la quantità di panna mantenendo la cremosità.",
   antitumorale:"Il limonene della scorza del limone di Sorrento IGP è tra i composti naturali più studiati in oncologia: inibisce la farnesil-proteina transferasi (enzima chiave nella crescita tumorale), ha mostrato regressione di carcinomi al seno in studi clinici preliminari, e riduce la sintesi epatica del colesterolo. La vitamina C del limone inibisce la formazione di nitrosammine cancerogene nel tratto gastrointestinale. L'erba cipollina apporta composti solforati con effetto antiproliferativo simile a quelli dell'aglio.",
   stagione:"Tutto l'anno (limoni di Sorrento IGP disponibili tutto l'anno, ottimali in inverno-primavera)",
   ingChips:[{t:"Tagliolini freschi",c:""},{t:"Limone Sorrento IGP",c:"igp"},{t:"Burro",c:""},{t:"Parmigiano",c:""},{t:"Basilico fresco",c:"km0"}]},

  {id:12,numero:13,title:"Zuppa di Fagioli di Controne e Scarola con Crostini di Segale",chef:"Somma",cat:"legumi",catLabel:"Zuppe & Legumi",accent:"acc-zuppa",
   tags:[["legumi","tag-legumi"],["km0","tag-km0"],["PAT","tag-pat"]],porzioni:"Dosi per 4 persone",
   ingredients:["250 g fagioli di Controne PAT (ammollati 12h)","300 g scarola riccia campana fresca (km0)","4 fette pane di segale integrale","3 spicchi aglio","olio EVO campano","brodo vegetale homemade","sale marino integrale","peperoncino","rosmarino fresco","1 pomodoro maturo","parmigiano reggiano (facoltativo)"],
   macros:{kcal:310,prot:16,carb:48,grassi:7},note:"I fagioli di Controne PAT, dal Cilento, sono tra le eccellenze leguminose campane",
   allergeni:"Glutine (pane di segale)",
   procedimento:"Ammollare i fagioli di Controne 12 ore. Cuocere in acqua non salata per 50-60 min. Soffriggere aglio e rosmarino in olio EVO, aggiungere il pomodoro e i fagioli cotti con parte del loro liquido. Cuocere 10 min. Lavare e tagliare la scarola riccia, sbollentare 3 min, strizzare bene. Aggiungere la scarola alla zuppa, regolare di sale. Tostare il pane di segale in forno. Servire la zuppa sui crostini di segale con abbondante olio EVO a crudo e peperoncino.",
   motivazione:"I fagioli di Controne PAT sono tra i legumi con il più alto contenuto di proteine vegetali (22 g/100 g) e fibre (15 g/100 g) nella tradizione cilentana. L'indice glicemico è molto basso (GL ≈ 6 per porzione). La scarola riccia campana è ricca di folati, vitamina K e acido cicorico. Il pane di segale integrale ha IG ≈ 40, significativamente più basso del pane bianco. La zuppa segue il principio della dieta mediterranea cilentana dichiarata Patrimonio UNESCO.",
   cottura:"I fagioli di Controne PAT vengono ammollati 12 ore e cotti in acqua non salata (il sale indurisce la buccia dei legumi): questa procedura è CCP fondamentale per inattivare le lectine fitoemagglutinine tossiche presenti nei legumi crudi. La scarola viene sbollentata separatamente 3 min e strizzata: riduce l'amaro e abbatte ossalati migliorando la biodisponibilità del ferro. Il pane di segale viene tostato a T ≤ 180°C. L'olio EVO viene versato esclusivamente a crudo nel piatto finito.",
   antitumorale:"I fagioli di Controne PAT contengono saponine, fitati e inibitori di proteasi con dimostrata attività di inibizione della proliferazione cellulare tumorale. La scarola riccia è ricca di acido cicorico e lattucina, composti amari con effetto pro-apoptotico. Il rosmarino apporta acido carnosico, uno degli antiossidanti liposolubili più potenti in natura, con effetto inibitorio sulla cancerogenesi epatica. Le fibre dei fagioli aumentano la produzione di butirrato nel colon, protettivo contro il tumore del colon-retto.",
   stagione:"Autunno-inverno (scarola riccia settembre-aprile; fagioli di Controne secchi tutto l'anno)",

  {diabete:"Il risotto con zucchine km0 ha un carico glicemico moderato (GL ≈ 22); usare riso carnaroli al dente riduce l'IG rispetto alla cottura prolungata. Lo speck in piccola quantità (25 g/porzione) non influisce significativamente sulla glicemia. Per l'ipertensione: lo speck contiene sodio — non aggiungere sale durante la cottura; le zucchine ricche di potassio bilanciano l'effetto pressorio; la menta ha proprietà vasodilatatorie. Per l'aterosclerosi: la quantità ridotta di speck (25 g/porzione) limita l'esposizione ai grassi saturi e ai nitriti; il parmigiano stagionato apporta calcio che ha effetti positivi sulla pressione arteriosa.",
   adattamenti:{vegan:"Omettere lo speck, sostituire il parmigiano con lievito alimentare (2 cucchiai). Aggiungere 50 g di pomodori secchi sott'olio e 30 g di noci tostate per compensare la sapidità e la ricchezza del piatto.",lattosio:"Omettere il parmigiano o sostituire con parmigiano stagionato ≥ 24 mesi (naturalmente privo di lattosio per fermentazione completa). Lo speck non contiene lattosio.",celiaci:"Il piatto è naturalmente senza glutine. Verificare che lo speck non contenga additivi con glutine (alcuni possono usare amido di frumento).",halal:"Lo speck è prodotto da carne di maiale — NON è halal. Sostituire con 80 g di bresaola di manzo o pollo affumicato halal. Tutti gli altri ingredienti sono halal.",kosher:"Lo speck è prodotto da maiale — NON è kosher. Sostituire con bresaola di manzo kosher certificata. Il piatto diventa carne (fleishig): omettere il parmigiano."},
   haccp:{fasi:[{nome:"Ricezione speck Alto Adige IGP",pericolo:"Biologico: Listeria monocytogenes (carne affumicata); Chimico: nitriti residui",ccp:true,misura:"Verifica T ≤ 4°C; data scadenza; integrità confezione; conservare separato da altri alimenti"},{nome:"Soffritto cipolla",pericolo:"Chimico: acroleina se cipolla brucia",ccp:false,misura:"Fuoco moderato; aggiungere olio a freddo; non superare il punto di fumo"},{nome:"Tostatura e cottura risotto",pericolo:"Biologico: Bacillus cereus",ccp:true,misura:"Consumare entro 2h dalla cottura; raffreddare rapidamente a ≤ 10°C entro 90 min se si conserva"},{nome:"Aggiunta speck",pericolo:"Biologico: ricontaminazione con Listeria",ccp:false,misura:"Lo speck viene aggiunto a metà cottura (T > 80°C); non aggiungere speck a piatto già freddo"},{nome:"Mantecatura e servizio",pericolo:"Biologico: zona di pericolo termico",ccp:false,misura:"Servire immediatamente a T > 65°C; non conservare il risotto mantecato"}]}},

  {diabete:"Il pesce spada ha GL ≈ 1 (praticamente nullo) — eccellente per diabetici. Le proteine del pesce spada (20 g/100 g) rallentano lo svuotamento gastrico. I crostini integrali aggiungono fibre che abbassano il carico glicemico. Per l'ipertensione: il pesce spada è naturalmente a basso sodio; il limone di Sorrento IGP può sostituire completamente il sale come condimento (acido citrico esalta la percezione del sapore); i capperi contengono quercetina con effetto antipertensivo. Per l'aterosclerosi: gli Omega-3 DHA ed EPA del pesce spada riducono i trigliceridi e aumentano le HDL; l'acido oleico dell'olio EVO è cardioprotettivo.",
   adattamenti:{vegan:"Non è possibile una tartare vegetale equivalente. Alternativa: tartare di avocado con capperi, limone IGP e pomodorini su crostini integrali. Oppure tartare di barbabietola rossa con senape e erba cipollina.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Sostituire il pane integrale con pane di riso o mais certificato GF. La tartare e la salsa al limone sono naturalmente GF. Verificare che la senape non contenga amido di frumento.",halal:"Il pesce spada è halal. Tutti gli altri ingredienti sono halal. Nessuna modifica.",kosher:"Il pesce spada ha pinne e squame — è kosher. Il piatto è parve. Verificare certificazione kosher di tutti i prodotti."},
   haccp:{fasi:[{nome:"Verifica abbattimento pesce spada",pericolo:"Biologico: Anisakis simplex (parassita mortale nel crudo) — PERICOLO PRINCIPALE",ccp:true,misura:"OBBLIGATORIO: certificato di abbattimento a -18°C per ≥ 24h (Reg. CE 853/2004); rifiutare se non certificato; documentazione obbligatoria"},{nome:"Ricezione e ispezione pesce abbattuto",pericolo:"Biologico: Listeria; Chimico: mercurio (pesce spada è bioaccumulatore)",ccp:true,misura:"T ≤ -18°C; aspetto e odore neutro dopo scongelamento; certificato di pesca e abbattimento; non servire a donne incinte (mercurio)"},{nome:"Scongelamento controllato",pericolo:"Biologico: moltiplicazione batterica nella zona di pericolo",ccp:true,misura:"Scongelare in frigorifero a ≤ 4°C per max 24h; mai a T ambiente; usare entro 4h dallo scongelamento"},{nome:"Tritatura al coltello",pericolo:"Biologico: contaminazione crociata da superfici; Fisico: frammenti di lische",ccp:true,misura:"Tagliere e coltello dedicati e sanificati; mani con guanti; verificare assenza di frammenti di pelle o lische"},{nome:"Assemblaggio e servizio immediato",pericolo:"Biologico: moltiplicazione rapida su pesce crudo a T ambiente",ccp:true,misura:"Servire IMMEDIATAMENTE dopo l'assemblaggio; T servizio ≤ 10°C; non conservare la tartare preparata"}]}},

  {diabete:"I piselli novelli sorrentini hanno IG ≈ 35 (basso) e la pasta integrale IG ≈ 42. Il GL del piatto è ≈ 20, accettabile per diabetici. Le alici di Cetara apportano Omega-3 che migliorano la sensibilità insulinica. Per l'ipertensione: le alici di Cetara vanno dissalate MOLTO accuratamente (il sodio residuo è il principale rischio di questo piatto); le noci di Sorrento PAT apportano arginine che producono ossido nitrico vasodilatatore; il limone IGP può sostituire il sale. Per l'aterosclerosi: gli Omega-3 delle alici di Cetara abbassano i trigliceridi; le noci PAT apportano acido linoleico che aumenta le HDL; la pasta integrale apporta steroli vegetali.",
   adattamenti:{vegan:"Sostituire le alici con 2 cucchiai di pasta di miso + 20 g di capperi dissalati (stesso umami e sapidità). Aumentare la granella di noci per compensare gli Omega-3.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Sostituire la pasta integrale con pasta di riso integrale o di legumi (stessa grammatura). Verificare che le alici in scatola non contengano additivi con glutine.",halal:"Le alici sono halal. Tutti gli altri ingredienti sono naturalmente halal. Verificare assenza di additivi non permessi.",kosher:"Le alici hanno pinne e squame — sono kosher. Il piatto è parve. Tutti gli ingredienti devono essere certificati kosher."},
   haccp:{fasi:[{nome:"Ricezione e dissalatura alici di Cetara",pericolo:"Biologico: Listeria nel sale; Chimico: istamina (Engraulis encrasicolus ad alto rischio); eccesso sodio",ccp:true,misura:"Immersione in acqua fredda ≤ 10°C per 30 min, cambiare acqua 2 volte; non a T ambiente; sfilettare con guanti"},{nome:"Ammollo e cottura pasta integrale",pericolo:"Fisico: corpi estranei",ccp:false,misura:"Ispezionare la pasta; acqua a forte ebollizione; colino pulito"},{nome:"Soffritto cipollotto",pericolo:"Chimico: composti volatili se brucia",ccp:false,misura:"Fuoco dolce; non annerire il cipollotto"},{nome:"Mantecatura",pericolo:"Biologico: zona di rischio se si raffredda",ccp:false,misura:"Mantecare a fuoco vivo per max 2 min; servire immediatamente"},{nome:"Aggiunta alici e noci",pericolo:"Biologico: istamina nelle alici se riscaldate; ossidazione noci",ccp:true,misura:"Aggiungere FUORI FUOCO; servire entro 5 min; non riscaldare il piatto dopo l'aggiunta delle alici"}]}},

  {diabete:"La seppia è il mollusco con il più basso contenuto calorico (72 kcal/100 g) e GL ≈ 3 — ideale per diabetici. Le zucchine San Pasquale PAT hanno IG ≈ 15. Per l'ipertensione: la seppia è a bassissimo contenuto di sodio naturale; il prezzemolo è ricco di potassio (800 mg/100 g) che bilancia il sodio intracellulare; i pomodorini del Piennolo DOP apportano potassio. Per l'aterosclerosi: l'inchiostro di seppia contiene melanina e taurina con proprietà antiossidanti che riducono l'ossidazione delle LDL; l'olio EVO apporta acido oleico cardioprotettivo; i pomodorini DOP forniscono licopene.",
   adattamenti:{vegan:"Non è possibile replicare la seppia con ingredienti vegani mantenendo la stessa struttura. Alternativa: funghi portobello ripieni con zucchine San Pasquale PAT, pane integrale e noci. Stesso sugo di pomodorini Piennolo DOP.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Sostituire il pane grattugiato integrale con pane di riso grattugiato GF. La seppia e le verdure sono naturalmente GF. Verificare il brodo.",halal:"La seppia è considerata halal dalla maggior parte delle scuole islamiche. Verificare con l'autorità religiosa di riferimento. Il vino bianco va sostituito con brodo vegetale + aceto bianco.",kosher:"La seppia (cefalopode) NON è kosher. Sostituire con involtini di merluzzo o nasello ripieni con le stesse verdure. Usare vino kosher certificato."},
   haccp:{fasi:[{nome:"Ricezione seppie fresche",pericolo:"Biologico: Vibrio parahaemolyticus; Fisico: residui di osso di seppia",ccp:true,misura:"T ≤ 2°C; aspetto (sacca integra, odore marino fresco); consumare entro 24h; verificare fornitore"},{nome:"Pulizia seppie (apertura sacca inchiostro)",pericolo:"Biologico: contaminazione crociata; Fisico: rottura sacca inchiostro",ccp:false,misura:"Guanti; sacca dell'inchiostro conservata o eliminata; lavaggio abbondante"},{nome:"Preparazione ripieno con uova crude",pericolo:"Biologico: Salmonella Enteritidis nell'uovo crudo",ccp:true,misura:"Uova freschissime (< 7 giorni); guscio integro; lavare le mani dopo; il ripieno raggiunge T ≥ 75°C in cottura"},{nome:"Cottura brasatura 35 min",pericolo:"Biologico: sopravvivenza patogeni nel ripieno",ccp:true,misura:"T interna ripieno ≥ 75°C per ≥ 2 min; verificare con sonda a cuore della seppia"},{nome:"Servizio",pericolo:"Biologico: ricontaminazione",ccp:false,misura:"Servire a T > 65°C; eliminare gli stuzzicadenti prima di servire; non conservare oltre 2h"}]}},

  {diabete:"Il farro integrale ha IG ≈ 35, il più basso tra i cereali, e GL ≈ 12 per porzione. Lo sgombro non contiene carboidrati. L'amido resistente generato dal raffreddamento migliora ulteriormente la risposta glicemica. Per l'ipertensione: lo sgombro al naturale è a basso contenuto di sodio; i pomodorini apportano licopene e potassio; il condimento a base di limone sostituisce il sale. Per l'aterosclerosi: lo sgombro è il pesce con la più alta concentrazione di Omega-3 (2,2 g/100 g) che abbassano i trigliceridi fino al 30%; il farro integrale apporta lignani che proteggono i vasi arteriosi.",
   adattamenti:{vegan:"Lo sgombro al naturale può essere sostituito con 200 g di tofu affumicato o 3 cucchiai di alga nori sbriciolata + 30 g di semi di chia per gli Omega-3 vegetali.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Il farro contiene glutine. Sostituire con riso integrale (250 g) o quinoa (250 g), stessa tecnica di ammollo e cottura. Verificare GF dello sgombro in scatola.",halal:"Lo sgombro è halal. Tutti gli altri ingredienti sono naturalmente halal. Nessuna modifica.",kosher:"Lo sgombro ha pinne e squame — è kosher. Il piatto è parve. Tutti gli ingredienti devono essere certificati kosher."},
   haccp:{fasi:[{nome:"Ammollo farro integrale 8 ore",pericolo:"Biologico: moltiplicazione batterica nell'acqua di ammollo",ccp:true,misura:"Ammollo in frigorifero a ≤ 4°C; non ammollare a T ambiente; usare acqua potabile; cambiare acqua a metà"},{nome:"Ricezione sgombro al naturale",pericolo:"Chimico: istamina (Scombridae ad alto rischio); Biologico: Clostridium in lattine danneggiate",ccp:true,misura:"Verificare integrità lattina (no rigonfiamenti, no ruggine); data scadenza; registrazione lotto"},{nome:"Cottura farro (45 min)",pericolo:"Biologico: inattivazione contaminanti",ccp:true,misura:"Ebollizione ≥ 100°C per 45 min; T interna ≥ 85°C; consistenza al morso"},{nome:"Raffreddamento rapido farro",pericolo:"Biologico: Bacillus cereus",ccp:true,misura:"Raffreddare a ≤ 10°C entro 90 min; non lasciare in contenitore chiuso a T ambiente"},{nome:"Assemblaggio e servizio",pericolo:"Biologico: contaminazione crociata",ccp:false,misura:"Superfici sanificate; consumare entro 24h in frigorifero; aggiungere lo sgombro solo al momento del servizio"}]}},

  {diabete:"Il riso integrale ha IG ≈ 50 (vs bianco ≈ 72). Gamberi, cozze e vongole non contengono carboidrati e non alzano la glicemia. Il brodo di pesce homemade è privo di zuccheri aggiunti o esaltatori di sapidità. Per l'ipertensione: le cozze sono naturalmente a basso sodio; limitare il sale aggiunto; il prezzemolo abbondante apporta potassio e flavonoidi antipertensivi; i gamberetti contengono iodio per la funzione tiroidea. Per l'aterosclerosi: i molluschi (cozze e vongole) hanno bassissimo contenuto di colesterolo; il selenio delle cozze attiva la glutatione perossidasi che riduce l'ossidazione delle LDL.",
   adattamenti:{vegan:"Sostituire gamberi, cozze e vongole con 300 g di funghi misti (shiitake, champignon) + alga wakame reidratata + cuore di palmito per la texture. Usare brodo di alghe (kombu) al posto del brodo di pesce.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Il riso è naturalmente GF. Verificare che il brodo di pesce non contenga additivi con glutine. Tutti gli altri ingredienti sono naturalmente GF.",halal:"I gamberi sono considerati halal dalla maggior parte delle scuole islamiche. Le cozze e le vongole variano per scuola — verificare. Sostituire con gamberi halal e pesce a pezzi se necessario.",kosher:"I crostacei (gamberi) e i molluschi (cozze, vongole) NON sono kosher. Sostituire con pesce kosher (merluzzo, salmone, tonno) a pezzi. Il piatto diventa parve."},
   haccp:{fasi:[{nome:"Ricezione cozze e vongole vive",pericolo:"Biologico: Vibrio parahaemolyticus, norovirus, biotossine algali; Chimico: metalli pesanti, diossine",ccp:true,misura:"Verificare bivalvi vivi (gusci chiusi o che si richiudono); etichetta CE con data raccolta; T ≤ 6°C; consumare entro 24h; zona di pesca certificata"},{nome:"Apertura cozze e vongole a fuoco vivo",pericolo:"Biologico: sopravvivenza Vibrio e norovirus",ccp:true,misura:"Fuoco vivo per ≥ 3 min; scartare i bivalvi che non si aprono; filtrare il liquido per rimuovere sabbia"},{nome:"Ricezione gamberetti freschi",pericolo:"Biologico: Salmonella, Vibrio; Chimico: solfiti (conservante)",ccp:true,misura:"T ≤ 2°C; aspetto (carne compatta, odore fresco); verificare presenza solfiti in etichetta"},{nome:"Cottura risotto (cottura graduale)",pericolo:"Biologico: Bacillus cereus",ccp:true,misura:"Mantenere ebollizione costante T ≥ 85°C; gamberetti aggiunti negli ultimi 3 min; T interna gamberetti ≥ 65°C"},{nome:"Servizio",pericolo:"Biologico: zona di pericolo termica",ccp:false,misura:"Servire immediatamente a T > 65°C; non riscaldare il risotto della pescatora più di una volta"}]}},

  {diabete:"I broccoli baresi hanno IG ≈ 10 (praticamente nullo) e la pasta integrale IG ≈ 42. Il GL del piatto è ≈ 16, molto favorevole per diabetici. Il sulforafano dei broccoli migliora la sensibilità insulinica a livello cellulare. Per l'ipertensione: i broccoli sono ricchi di potassio (316 mg/100 g) e magnesio; il peperoncino contiene capsaicina con effetto vasodilatatorio acuto; l'acqua di cottura dei broccoli è ricca di potassio — usarla nella mantecatura trasferisce questo minerale al piatto. Per l'aterosclerosi: i broccoli contengono luteina e zeaxantina antiossidanti; il provolone del Monaco DOP stagionato apporta CLA (acido linoleico coniugato) cardioprotettivo in piccole quantità.",
   adattamenti:{vegan:"Omettere il provolone del Monaco DOP, sostituire con 2 cucchiai di lievito alimentare in scaglie + 1 cucchiaio di pasta di miso bianco per la sapidità. I broccoli e la pasta integrale sono già vegani.",lattosio:"Sostituire il provolone del Monaco con parmigiano reggiano stagionato ≥ 24 mesi (privo di lattosio per fermentazione completa) o con lievito alimentare.",celiaci:"Sostituire le pennette integrali con pasta integrale di riso o mais certificata GF. I broccoli e il condimento sono naturalmente GF.",halal:"Il provolone del Monaco DOP deve essere prodotto con caglio halal. Tutti gli altri ingredienti sono naturalmente halal.",kosher:"Il piatto con provolone del Monaco è lattisinio (milchig). Non servire con carne. Il formaggio deve essere prodotto con caglio kosher certificato."},
   haccp:{fasi:[{nome:"Ricezione broccoli baresi freschi",pericolo:"Biologico: Listeria; Fisico: insetti, bruchi tra le cimette",ccp:false,misura:"Ispezione visiva accurata tra le cimette; lavaggio in acqua corrente; immersione in acqua salata 10 min per far emergere eventuali insetti"},{nome:"Lavaggio e taglio broccoli",pericolo:"Biologico: contaminazione crociata",ccp:false,misura:"Tagliere dedicato per verdure; coltello sanificato; non usare stesso tagliere di carne o pesce"},{nome:"Cottura broccoli nella stessa acqua della pasta",pericolo:"Chimico: degradazione glucosinolati con cottura prolungata",ccp:true,misura:"Cottura max 6-8 min al dente; I broccoli devono restare verde brillante; non prolungare la cottura"},{nome:"Mantecatura con acqua di cottura",pericolo:"Biologico: recontaminazione da superfici",ccp:false,misura:"Padella sanificata; tenersi sotto il punto di fumo dell'olio EVO (210°C)"},{nome:"Aggiunta provolone fuori fuoco",pericolo:"Biologico: Listeria nel formaggio a pasta semidura",ccp:false,misura:"Il calore residuo della pasta (≥ 70°C) è sufficiente; servire immediatamente; non conservare oltre 2h"}]}},

  {diabete:"Le cicerchie di Capri PAT hanno IG < 30, il più basso tra tutti i legumi. L'amido della pasta mista nella zuppa viene rallentato nella sua digestione dalle fibre delle cicerchie (GL ≈ 15). Per l'ipertensione: la zuppa è naturalmente a basso contenuto di sodio (non si aggiunge sale durante la cottura dei legumi); il rosmarino contiene acido rosmarinico con effetto inibitorio dell'ACE (vasodilatazione); i pomodori apportano potassio. Per l'aterosclerosi: le fibre solubili delle cicerchie riducono il colesterolo LDL intrappolandolo nell'intestino; i polifenoli del rosmarino inibiscono l'ossidazione delle LDL; l'olio EVO a crudo apporta oleocantale cardioprotettivo.",
   adattamenti:{vegan:"Il piatto è già completamente vegano. Verificare che il brodo vegetale non contenga estratti di carne.",lattosio:"Il piatto è naturalmente privo di lattosio. Nessuna modifica.",celiaci:"Sostituire la pasta mista con pasta mista di riso o mais certificata GF. Le cicerchie e le verdure sono naturalmente GF.",halal:"Il piatto è naturalmente halal. Tutti gli ingredienti vegetali sono permessi.",kosher:"Il piatto è parve e naturalmente kosher. Tutti gli ingredienti devono essere certificati kosher."},
   haccp:{fasi:[{nome:"Ammollo cicerchie di Capri PAT 24h (CCP CRITICO)",pericolo:"Chimico: ODAP (neurotossina responsabile del latirismo) — deve essere eliminata",ccp:true,misura:"Ammollo MINIMO 24h in acqua fredda in frigorifero; cambiare l'acqua almeno 3 volte; eliminare TUTTA l'acqua di ammollo"},{nome:"Cottura cicerchie 60-70 min senza sale",pericolo:"Chimico: residui ODAP; Biologico: lectine fitoemagglutinine",ccp:true,misura:"Ebollizione ≥ 100°C per ≥ 60 min; assaggiare per verificare completa tenerezza; NON salare l'acqua di cottura (indurirebbe la buccia)"},{nome:"Soffritto aglio e rosmarino",pericolo:"Chimico: acroleina se l'aglio brucia",ccp:false,misura:"Fuoco moderato; l'aglio deve diventare dorato non marrone; aggiungere subito i pomodori se l'aglio tende a bruciare"},{nome:"Cottura pasta nella zuppa",pericolo:"Biologico: proliferazione batterica se la zuppa raffredda troppo",ccp:false,misura:"Mantenere ebollizione leggera durante la cottura della pasta; non lasciare la zuppa a T ambiente dopo la cottura"},{nome:"Tostatura crostini di segale e servizio",pericolo:"Chimico: acrilammide nel pane tostato eccessivamente",ccp:true,misura:"Tostatura a T ≤ 180°C; colore dorato non scuro; olio EVO a crudo nel piatto finale"}]}},

  {diabete:"I tagliolini freschi all'uovo hanno IG ≈ 55 (più alto della pasta secca, struttura più morbida). La panna riduce leggermente l'assorbimento dei carboidrati. Per una versione più adatta ai diabetici: ridurre la panna a 30 ml/porzione e aumentare la scorza di limone. Per l'ipertensione: il limone di Sorrento IGP è ricco di potassio e vitamina C; ridurre il sale al minimo (la scorza di limone insaporisce senza sodio); ridurre il burro a 20 g per 4 porzioni. Per l'aterosclerosi: il burro contiene grassi saturi — limitare a 10 g/porzione; la panna va ridotta al minimo e in parte sostituita con brodo vegetale; il limonene del limone IGP inibisce la HMG-CoA reduttasi riducendo la sintesi epatica del colesterolo.",

let editorOpen=false, currentEditId=0;

function buildEditorSelect(){const sel=document.getElementById('editor-recipe-select');sel.innerHTML=data.map(r=>`<option value="${r.id}">${r.numero}. ${r.title}</option>`).join('');sel.value=currentEditId;loadRecipeInEditor(currentEditId)}
function loadRecipeInEditor(id){currentEditId=id;const r=data.find(x=>x.id===id);if(!r)return;const idx=data.findIndex(x=>x.id===id);const ex=extraData[idx]||{};const cats=[{v:'mare',l:'Mare & Pesce'},{v:'pasta',l:'Pasta & Cereali'},{v:'legumi',l:'Legumi'},{v:'veg',l:'Verdure'}];const catOpts=cats.map(c=>`<option value="${c.v}"${r.cat===c.v?' selected':''}>${c.l}</option>`).join('');document.getElementById('editor-form-body').innerHTML=`<div class="field-section-title">📋 Informazioni base</div><div class="field-group"><label>Nome del piatto</label><input id="ef-title" value="${esc(r.title)}"></div><div class="field-group"><label>Chef / Autore</label><input id="ef-chef" value="${esc(r.chef)}"></div><div class="field-group"><label>Categoria</label><select id="ef-cat">${catOpts}</select></div><div class="field-group"><label>Dosi / Porzioni</label><input id="ef-porzioni" value="${esc(r.porzioni)}"></div><div class="field-group"><label>Nota breve</label><input id="ef-note" value="${esc(r.note)}"></div><div class="field-sep"></div><div class="field-section-title">🛒 Ingredienti (uno per riga)</div><div class="field-group"><textarea id="ef-ing" class="tall">${r.ingredients.join('\n')}</textarea></div><div class="field-sep"></div><div class="field-section-title">⚠️ Allergeni</div><div class="field-group"><input id="ef-allergeni" value="${esc(r.allergeni)}"></div><div class="field-sep"></div><div class="field-section-title">📊 Valori nutrizionali (per porzione)</div><div class="macro-row"><div class="field-group"><label>kcal</label><input type="number" id="ef-kcal" value="${r.macros.kcal}"></div><div class="field-group"><label>Proteine g</label><input type="number" id="ef-prot" value="${r.macros.prot}"></div><div class="field-group"><label>Carboidrati g</label><input type="number" id="ef-carb" value="${r.macros.carb}"></div><div class="field-group"><label>Grassi g</label><input type="number" id="ef-grassi" value="${r.macros.grassi}"></div></div><div class="field-sep"></div><div class="field-section-title">👨‍🍳 Procedimento</div><div class="field-group"><textarea id="ef-proc" class="tall">${esc(r.procedimento)}</textarea></div><div class="field-sep"></div><div class="field-section-title">🩺 Motivazione nutrizionale</div><div class="field-group"><textarea id="ef-motiv" class="tall">${esc(r.motivazione)}</textarea></div><div class="field-sep"></div><div class="field-section-title">🍳 Tecniche di cottura</div><div class="field-group"><textarea id="ef-cottura" class="tall">${esc(r.cottura)}</textarea></div><div class="field-sep"></div><div class="field-section-title">🔬 Prevenzione oncologica</div><div class="field-group"><textarea id="ef-antitum" class="tall">${esc(r.antitumorale)}</textarea></div><div class="field-sep"></div><div class="field-section-title">🌿 Stagionalità</div><div class="field-group"><input id="ef-stagione" value="${esc(r.stagione)}"></div><div class="field-sep"></div><div class="field-section-title" style="color:#C0392B">💊 Diabete T2, Ipertensione &amp; Aterosclerosi</div><div class="field-group"><textarea id="ef-diabete" class="tall">${esc(ex.diabete||'')}</textarea></div><div class="field-sep"></div><div class="field-section-title">🍽 Adattamenti dietetici</div><div class="field-group"><label>🌱 Vegan</label><textarea id="ef-ad-vegan" class="tall">${esc((ex.adattamenti||{}).vegan||'')}</textarea></div><div class="field-group"><label>🥛 Lattosio</label><textarea id="ef-ad-latt" class="tall">${esc((ex.adattamenti||{}).lattosio||'')}</textarea></div><div class="field-group"><label>🌾 Celiaci</label><textarea id="ef-ad-celi" class="tall">${esc((ex.adattamenti||{}).celiaci||'')}</textarea></div><div class="field-group"><label>☪ Halal</label><textarea id="ef-ad-halal" class="tall">${esc((ex.adattamenti||{}).halal||'')}</textarea></div><div class="field-group"><label>✡ Kosher</label><textarea id="ef-ad-kosh" class="tall">${esc((ex.adattamenti||{}).kosher||'')}</textarea></div><div class="field-sep"></div><div class="field-section-title" style="color:#2C3E50">🔐 Fasi HACCP (una per riga: Nome | Pericolo | Misura | true/false)</div><div class="field-group"><textarea id="ef-haccp" style="min-height:160px">${((ex.haccp||{}).fasi||[]).map(f=>`${f.nome} | ${f.pericolo} | ${f.misura} | ${f.ccp}`).join('\n')}</textarea></div><div class="field-sep"></div><div class="field-section-title" style="color:#e07070">🗑 Elimina ricetta</div><div class="field-group"><button onclick="deleteRecipe(${r.id})" style="width:100%;padding:.5rem;background:#7a2020;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.85rem">Elimina questa ricetta</button></div>`}
